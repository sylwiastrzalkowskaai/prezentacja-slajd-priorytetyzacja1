<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f7;padding:14px;font-size:12px;color:#1a1a2e}
h1{text-align:center;font-size:15px;font-weight:800;margin-bottom:3px}
.subtitle{text-align:center;font-size:10px;color:#666;margin-bottom:12px}

/* NAV — fazy + projekty */
.nav-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.phase-btn{padding:5px 12px;border-radius:6px;cursor:pointer;font-size:10px;font-weight:700;border:2px solid;transition:all .15s;letter-spacing:.4px}
.phase-btn.active{color:#fff}
.proj-nav{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.proj-btn{padding:4px 10px;border-radius:20px;cursor:pointer;font-size:10px;font-weight:600;border:1.5px solid;background:#fff;transition:all .15s}
.proj-btn.active{color:#fff}
.proj-btn:hover:not(.active){opacity:.8}

/* PANEL */
.panel{background:#fff;border-radius:10px;border:2px solid #e5e7eb;overflow:hidden}
.panel-header{padding:12px 16px;display:flex;align-items:center;gap:10px;justify-content:space-between}
.panel-title{font-size:13px;font-weight:700}
.panel-sub{font-size:10px}
.verdict-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px}

/* STATS ROW */
.stats-row{display:flex;gap:8px;padding:10px 16px;border-bottom:1px solid #f0f2f7;flex-wrap:wrap}
.stat-box{background:#f8f9ff;border-radius:6px;padding:7px 12px;text-align:center;flex:1;min-width:90px}
.stat-num{font-size:17px;font-weight:700}
.stat-lbl{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.4px}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:700px}
th{background:#1e3a8a;color:#fff;padding:7px 10px;font-size:9.5px;font-weight:700;text-align:left;letter-spacing:.3px;white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid #f0f2f7;font-size:10px;vertical-align:top;line-height:1.5}
tr:hover td{background:#fafbff}
.q-num{color:#999;font-weight:700;font-size:10px;width:24px}
.q-text{color:#333;max-width:180px;font-size:10px}
.dec-tak{color:#16a34a;font-weight:700;font-size:10px;white-space:nowrap}
.dec-nie{color:#dc2626;font-weight:700;font-size:10px;white-space:nowrap}
.dec-partial{color:#d97706;font-weight:700;font-size:10px;white-space:nowrap}
.action-txt{color:#555;font-size:9.5px}
.cost-txt{color:#7c3aed;font-weight:600;font-size:10px;white-space:nowrap}
.time-txt{color:#2563eb;font-weight:600;font-size:10px;white-space:nowrap}
.comment-txt{color:#666;font-size:9.5px;font-style:italic}
.sum-box{margin:10px 16px;border-radius:6px;padding:9px 12px;font-size:10px;line-height:1.6}
</style>
</head>

/* ── buduj UI ── */
let activePhase = 1;
let activeProj  = 1;

const PHASE_COLS = {1:"#16a34a",2:"#2563eb",3:"#d97706",4:"#7c3aed"};
const Q_LABELS = [
  "Moc obliczeniowa (GPU)?",
  "Przestrzeń dyskowa?",
  "Integracja z systemami?",
  "Architektura i przepustowość sieci?",
  "Bezpieczeństwo i regulacje?",
  "Zgodność i etyka / wyjaśnialność?",
  "Na jakie urządzenia?",
  "Dane — dostępność i jakość?",
  "Zespół wewnętrzny?",
  "Konserwacja i retrening modelu?",
  "Skalowanie rozwiązania?",
  "Testy i walidacja?",
  "Prawdopodobieństwo osiągnięcia metryk?",
  "DODATKOWE: Całkowite koszty?",
  "DODATKOWE: Harmonogram projektu?",
];

function buildPhaseNav(){
  const wrap = document.getElementById('phase-nav');
  FAZY.forEach(f=>{
    const btn = document.createElement('button');
    btn.className = 'phase-btn'+(f.id===activePhase?' active':'');
    btn.textContent = f.name;
    btn.style.borderColor = f.col;
    if(f.id===activePhase){btn.style.background=f.col;btn.style.color='#fff';}
    else{btn.style.color=f.col;btn.style.background='#fff';}
    btn.onclick = ()=>{
      activePhase=f.id;
      const firstP = PROJEKTY.find(p=>p.faza===activePhase);
      activeProj = firstP ? firstP.id : activeProj;
      buildPhaseNav(); buildProjNav(); renderPanel();
    };
    wrap.appendChild(btn);
  });
}

function buildProjNav(){
  const wrap = document.getElementById('proj-nav');
  wrap.innerHTML='';
  const col = PHASE_COLS[activePhase];
  const projs = PROJEKTY.filter(p=>p.faza===activePhase);
  projs.forEach(p=>{
    const btn = document.createElement('button');
    btn.className='proj-btn'+(p.id===activeProj?' active':'');
    btn.textContent='#'+p.id+' '+p.name.substring(0,30)+(p.name.length>30?'…':'');
    btn.style.borderColor=col;
    if(p.id===activeProj){btn.style.background=col;btn.style.color='#fff';}
    else{btn.style.color='#333';}
    btn.onclick=()=>{activeProj=p.id;buildProjNav();renderPanel();};
    wrap.appendChild(btn);
  });
}

function decClass(dec){
  if(dec==='TAK'||dec==='REALIZOWALNY'||dec==='BARDZO WYSOKIE'||dec==='BARDZO NISKIE') return 'dec-tak';
  if(dec.startsWith('NIE')||dec==='WYMAGANE'||dec==='NIE GOTOWE') return 'dec-nie';
  return 'dec-partial';
}

function renderPanel(){
  const proj = PROJEKTY.find(p=>p.id===activeProj);
  if(!proj) return;
  const col = PHASE_COLS[proj.faza];
  const faza = FAZY.find(f=>f.id===proj.faza);
  const verdCol = proj.verdictCol;

  /* count tak/nie */
  let takCount=0,nieCount=0,partCount=0;
  proj.pytania.forEach(p=>{
    const c=decClass(p.dec);
    if(c==='dec-tak')takCount++;
    else if(c==='dec-nie')nieCount++;
    else partCount++;
  });
  const totalBudget = proj.pytania.map(p=>p.koszt).filter(k=>k!=='—'&&k!=='Proporcjonalnie'&&!k.includes('Wg')&&!k.includes('wg'));
  const totalTime   = proj.pytania.map(p=>p.czas).filter(k=>k!=='—');

  document.getElementById('main-panel').innerHTML=`
    <div class="panel-header" style="background:${col}15;border-bottom:1px solid ${col}30">
      <div>
        <div class="panel-title" style="color:${col}">#${proj.id} — ${proj.name}</div>
        <div class="panel-sub" style="color:#666">${faza.name}</div>
      </div>
      <div>
        <span class="verdict-badge" style="background:${verdCol}20;color:${verdCol}">${proj.verdict}</span>
        <div style="font-size:10px;color:#888;margin-top:3px;text-align:right">Pilot: ${proj.budzetPilota} · ${proj.czasPilota}</div>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num" style="color:#16a34a">${takCount}</div><div class="stat-lbl">TAK</div></div>
      <div class="stat-box"><div class="stat-num" style="color:#d97706">${partCount}</div><div class="stat-lbl">Wymaga pracy</div></div>
      <div class="stat-box"><div class="stat-num" style="color:#dc2626">${nieCount}</div><div class="stat-lbl">Bloker / NIE</div></div>
      <div class="stat-box"><div class="stat-num" style="color:#7c3aed">${proj.budzetPilota}</div><div class="stat-lbl">Budżet pilota</div></div>
      <div class="stat-box"><div class="stat-num" style="color:#2563eb">${proj.czasPilota}</div><div class="stat-lbl">Czas pilota</div></div>
    </div>
    <div class="tbl-wrap">
    <table>
      <tr>
        <th style="width:22px">#</th>
        <th style="min-width:140px">Pytanie o wykonalność</th>
        <th style="width:90px">TAK / JESZCZE NIE</th>
        <th style="min-width:160px">Wymagane działania</th>
        <th style="width:100px">Szacowany koszt</th>
        <th style="width:80px">Szac. czas</th>
        <th style="min-width:160px">Komentarz</th>
      </tr>
      ${proj.pytania.map((p,i)=>`
      <tr>
        <td class="q-num">${i+1}</td>
        <td class="q-text">${Q_LABELS[i]}</td>
        <td class="${decClass(p.dec)}">${p.dec}</td>
        <td class="action-txt">${p.action}</td>
        <td class="cost-txt">${p.koszt}</td>
        <td class="time-txt">${p.czas}</td>
        <td class="comment-txt">${p.comment}</td>
      </tr>`).join('')}
    </table>
    </div>
  `;
}

buildPhaseNav();
buildProjNav();
renderPanel();
</script>
